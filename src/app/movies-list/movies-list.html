<div class="container mb-5">
  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
    @for (movie of movies; track movie.id) {
      <div class="col">
        <div class="card h-100 shadow-sm movie-card bg-white">
          
          <div class="position-relative card-header-image">
            <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'" class="card-img-top" alt="Poster">             
            <div class="card-img-overlay d-flex flex-column justify-content-end p-0">
              <div class="badge-rating shadow-sm">
                <i class="bi bi-star-fill text-warning me-1"></i> {{ movie.rate }}
              </div>
              <h5 class="overlay-title p-3">{{ movie.title }}</h5> 
            </div>
            </div>
          
          <div class="card-body">
            <h5 class="card-title text-dark text-uppercase small">{{ movie.title }}</h5>
            <p class="card-director small">{{ movie.director }}</p> <p class="card-text">
              {{ movie.synopsis }}
            </p>
          </div>
          
          <div class="card-footer d-flex justify-content-between align-items-center">
            <small class="release-date"><i class="bi bi-calendar3 me-1"></i>{{ movie.releaseDate | date:'yyyy' }}</small>
            <button class="btn btn-delete" (click)="deleteMovie(movie.id!)">
              <i class="bi bi-trash3-fill"></i>
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
