<div class="container py-5">
  
  <div class="text-center mb-5 header-container">
    <h1 class="douceur-title">🎬 DOUCEUR CINÉMA 🍿</h1>
    <div class="title-glow"></div>
    <p class="subtitle-fancy">L'art du septième art, rien que pour vous.</p>
  </div>

  <div class="movie-grid">
    @for (movie of movies; track movie.id) {
      <div class="movie-card-wrapper">
        <div class="funky-card shadow">
          
          <div class="image-box">
            <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'" alt="Affiche">
            <div class="rating-ribbon">
              <i class="bi bi-star-fill"></i> {{ movie.rate }}
            </div>
          </div>

          <div class="content-box">
            <h5 class="movie-title">{{ movie.title }}</h5>
            <span class="director-badge">{{ movie.director }}</span>
            <p class="synopsis-box">{{ movie.synopsis | slice:0:100 }}...</p>
            
            <div class="card-footer-fun">
              <span class="year-label"><i class="bi bi-calendar3"></i> {{ movie.releaseDate | date:'yyyy' }}</span>
              <button class="delete-circle" (click)="deleteMovie(movie.id!)">
                <i class="bi bi-trash3-fill"></i>
              </button>
            </div>
          </div>

        </div>
      </div>
    }
  </div>
</div>
