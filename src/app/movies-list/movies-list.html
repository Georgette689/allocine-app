<div class="position-relative overflow-hidden card-header-image">
  <img [src]="movie.image || 'https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1000'" 
       class="card-img-top shadow" alt="Poster">
  
  <div class="card-img-overlay d-flex flex-column justify-content-end">
    <div class="badge-rating shadow-sm">
      <i class="bi bi-star-fill text-warning me-1"></i> {{ movie.rate }}
    </div>
  </div>
</div>
