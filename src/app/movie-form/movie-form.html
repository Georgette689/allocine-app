<div class="container mt-4">
  <div class="card shadow-sm p-4">
    <h3 class="mb-4 text-primary">Ajouter un nouveau film</h3>
    <form (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-8 mb-3">
          <label class="form-label fw-bold">Titre du film</label>
          <input type="text" class="form-control" [(ngModel)]="newMovie.title" name="title" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Note / 5</label>
          <input type="number" step="0.1" class="form-control" [(ngModel)]="newMovie.rate" name="rate">
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Date de sortie</label>
          <input type="date" class="form-control" [(ngModel)]="newMovie.releaseDate" name="releaseDate">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Heure ou Durée</label>
          <input type="text" class="form-control" [(ngModel)]="newMovie.duration" name="duration">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">Synopsis</label>
        <textarea class="form-control" rows="4" [(ngModel)]="newMovie.synopsis" name="synopsis"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success px-4">Enregistrer le film</button>
        <a routerLink="/movies" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
