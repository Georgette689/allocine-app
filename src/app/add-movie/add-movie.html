<nav class="custom-nav shadow-sm mb-5">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="brand-logo" routerLink="/">🎬 ALLOCINÉ</span>
    <a routerLink="/" class="btn-back">
      <i class="bi bi-arrow-left-circle-fill me-2"></i>RETOUR À LA LISTE
    </a>
  </div>
</nav>

<div class="form-container">
  <div class="glass-form shadow-lg">
    <h1 class="form-title text-center mb-4">AJOUTER UNE PÉPITE 🍿</h1>
    
    <form class="custom-form">
      <div class="input-group-custom">
        <label>Titre du film</label>
        <input type="text" placeholder="Ex: Inception">
      </div>

      <div class="input-group-custom">
        <label>Réalisateur</label>
        <input type="text" placeholder="Ex: CHRISTOPHER NOLAN">
      </div>

      <div class="row">
        <div class="col-md-6 input-group-custom">
          <label>Date de sortie</label>
          <input type="date">
        </div>
        <div class="col-md-6 input-group-custom">
          <label>Note / 5</label>
          <input type="number" step="0.1" min="0" max="5">
        </div>
      </div>

      <div class="input-group-custom">
        <label>Synopsis</label>
        <textarea rows="3" placeholder="Décrivez le film en plus de 30 caractères..."></textarea>
      </div>

      <div class="input-group-custom">
        <label>URL de l'affiche</label>
        <input type="text" placeholder="https://...">
      </div>

      <div class="form-actions mt-4">
        <button type="submit" class="btn-save">ENREGISTRER LE FILM</button>
        <button type="button" class="btn-cancel" routerLink="/">ANNULER</button>
      </div>
    </form>
  </div>
</div>
