<div class="container mt-4">
  <h1 class="mb-4">Ajouter un film</h1>

  <div class="card p-4 shadow-sm" style="max-width: 600px;">
    <div class="mb-3 d-flex flex-column">
      <label for="title" class="fw-bold">Titre</label>
      <input type="text" id="title" name="title" class="form-control" [(ngModel)]="movie.title"/>
    </div>

    <div class="mb-3 d-flex flex-column">
      <label for="director" class="fw-bold">Réalisateur</label>
      <input type="text" id="director" name="director" class="form-control" [(ngModel)]="movie.director"/>
    </div>

    <div class="mb-3 d-flex flex-column">
      <label for="releaseDate" class="fw-bold">Date de sortie</label>
      <input type="date" id="releaseDate" name="releaseDate" class="form-control" [(ngModel)]="movie.releaseDate"/>
    </div>

    <div class="mb-3 d-flex flex-column">
      <label for="synopsis" class="fw-bold">Synopsis</label>
      <textarea id="synopsis" name="synopsis" class="form-control" rows="3" [(ngModel)]="movie.synopsis"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-warning" (click)="addMovie()">Ajouter</button>
      <button class="btn btn-outline-secondary" routerLink="/movies">Annuler</button>
    </div>
  </div>
</div>
