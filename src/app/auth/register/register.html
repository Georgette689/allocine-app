<div class="auth-container">
  <h2>Create your account</h2>
  <form (ngSubmit)="register()">
    <input type="text" placeholder="Prénom" [(ngModel)]="user.firstName" name="firstName" required />
    <input type="text" placeholder="Nom" [(ngModel)]="user.lastName" name="lastName" required />
    <input type="email" placeholder="Email" [(ngModel)]="user.email" name="email" required />
    <input type="password" placeholder="Password" [(ngModel)]="user.password" name="password" required />
    <input type="password" placeholder="Confirm Password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
    <div class="error" *ngIf="error">{{ error }}</div>
    <button type="submit">Register</button>
  </form>
  <p>Already have an account? <a href="/login" class="text-blue">Sign in</a></p>
</div>
